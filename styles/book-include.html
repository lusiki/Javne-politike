<script>
(function () {
  "use strict";

  // ----------------------------------------------------------
  // 1. Reading progress bar
  // ----------------------------------------------------------
  function setupProgressBar() {
    if (document.getElementById("reading-progress")) return;
    var bar = document.createElement("div");
    bar.id = "reading-progress";
    document.body.appendChild(bar);

    var ticking = false;
    function update() {
      var doc = document.documentElement;
      var scrollTop = window.scrollY || doc.scrollTop;
      var max = (doc.scrollHeight - doc.clientHeight) || 1;
      var pct = Math.min(100, Math.max(0, (scrollTop / max) * 100));
      bar.style.width = pct + "%";
      ticking = false;
    }
    window.addEventListener("scroll", function () {
      if (!ticking) {
        window.requestAnimationFrame(update);
        ticking = true;
      }
    }, { passive: true });
    update();
  }

  // ----------------------------------------------------------
  // (Uklonjeno: chapter-number watermark, reading-time chip, drop cap i
  //  ❦ ornament — ovisili su o naslovu koji počinje brojkom, a uz
  //  number-sections: false nijedan se nije okidao. Vidi izvjestaj-estetski H1.)
  // ----------------------------------------------------------
  // 2. Hover preview za interne linkove (#anchors u istom dokumentu)
  // ----------------------------------------------------------
  function setupInternalHover() {
    var tip = null;
    var hideTimer = null;

    function ensureTip() {
      if (tip) return tip;
      tip = document.createElement("div");
      tip.className = "internal-hover-preview";
      document.body.appendChild(tip);
      return tip;
    }

    function show(target, text, title) {
      var t = ensureTip();
      t.innerHTML = "";
      if (title) {
        var h = document.createElement("div");
        h.className = "ihp-title";
        h.textContent = title;
        t.appendChild(h);
      }
      var body = document.createElement("div");
      body.textContent = text;
      t.appendChild(body);

      var rect = target.getBoundingClientRect();
      var top = window.scrollY + rect.bottom + 8;
      var left = window.scrollX + rect.left;
      // Drži unutar viewporta
      var maxLeft = window.scrollX + document.documentElement.clientWidth - 400;
      if (left > maxLeft) left = maxLeft;
      if (left < 8) left = 8;
      t.style.top = top + "px";
      t.style.left = left + "px";
      t.classList.add("visible");
    }

    function hide() {
      if (tip) tip.classList.remove("visible");
    }

    document.addEventListener("mouseover", function (e) {
      var a = e.target.closest && e.target.closest("a[href^='#']");
      if (!a) return;
      // Preskačemo Quarto-ove vlastite citation/footnote (oni već imaju hover)
      if (a.classList.contains("citation") || a.classList.contains("footnote-ref")) return;
      if (a.closest(".sidebar, nav, .toc, #TOC, .quarto-secondary-nav")) return;

      var hash = a.getAttribute("href").slice(1);
      if (!hash) return;
      var tgt = document.getElementById(hash);
      if (!tgt) return;

      var titleEl = tgt.querySelector("h1, h2, h3, h4") || (tgt.tagName.match(/^H[1-6]$/) ? tgt : null);
      var title = titleEl ? titleEl.textContent.trim() : "";
      // Uzimamo prvih ~280 znakova konteksta
      var ctx = (tgt.textContent || "").trim().replace(/\s+/g, " ");
      if (title) ctx = ctx.replace(title, "").trim();
      ctx = ctx.slice(0, 280) + (ctx.length > 280 ? "…" : "");

      clearTimeout(hideTimer);
      show(a, ctx, title);
    });

    document.addEventListener("mouseout", function (e) {
      var a = e.target.closest && e.target.closest("a[href^='#']");
      if (!a) return;
      hideTimer = setTimeout(hide, 120);
    });

    window.addEventListener("scroll", hide, { passive: true });
  }

  // ----------------------------------------------------------
  // 3. Dinkus normalization — pretvori "***" parove i prazne
  //    dinkus blokove u stilizirane romb-trojke
  // ----------------------------------------------------------
  function setupDinkus() {
    // Quartov ::: {.dinkus} već dobiva div.dinkus klasu — to već stiliziramo CSS-om
    // Pretvori HR elemente s točno tri zvjezdice ili "* * *" tekstom
    var hrs = document.querySelectorAll("hr");
    hrs.forEach(function (hr) {
      // Ako je hr unutar contenta i nije .dinkus, ostavi ga
    });
    // Pretvori paragrafe koji su točno "***" u dinkus
    var paragraphs = document.querySelectorAll("main p");
    paragraphs.forEach(function (p) {
      var t = p.textContent.trim();
      if (t === "***" || t === "* * *" || t === "◆ ◆ ◆") {
        var div = document.createElement("div");
        div.className = "dinkus";
        p.parentNode.replaceChild(div, p);
      }
    });
  }

  // ----------------------------------------------------------
  // 8. Anchor link injection (Quarto's anchor-sections nije uvijek
  //    pouzdan; dodajemo vlastite # linkove na sve h2-h4 koji ih nemaju)
  // ----------------------------------------------------------
  function setupAnchorLinks() {
    var article = document.querySelector("main.content") || document.querySelector("main");
    if (!article) return;
    var headings = article.querySelectorAll("h2[id], h3[id], h4[id]");
    headings.forEach(function (h) {
      // Preskoči chapter title i postojeće anchorjs linkove
      if (h.classList.contains("title")) return;
      if (h.querySelector("a.anchorjs-link")) return;

      var link = document.createElement("a");
      link.className = "anchorjs-link";
      link.href = "#" + h.id;
      link.setAttribute("aria-label", "Permalink na ovaj odjeljak");
      h.appendChild(link);
    });
  }

  // ----------------------------------------------------------
  // 9a. Standalone pages: vodic, resursi, alat — strip book chrome
  // ----------------------------------------------------------
  function setupStandalonePages() {
    var path = location.pathname;
    var standalonePages = ["/vodic.html", "/resursi.html", "/alat.html"];
    var isStandalone = standalonePages.some(function (p) {
      return path.endsWith(p);
    });
    if (!isStandalone) return;

    // 1. Add body class — picks up CSS rules in styles.css
    document.body.classList.add("standalone-page");

    // 2. Force-hide book sidebar and breadcrumb (belt + suspenders)
    var sb = document.getElementById("quarto-sidebar");
    if (sb) sb.style.display = "none";
    var msb = document.getElementById("quarto-margin-sidebar");
    if (msb) msb.style.display = "none";
    document.querySelectorAll(".quarto-page-breadcrumbs, nav.quarto-page-breadcrumbs").forEach(function (el) {
      el.remove();
    });

    // 3. Remove "Appendix A —" / "Appendix B —" etc. prefix from page title
    var titleEl = document.querySelector("#title-block-header h1.title, h1.title");
    if (titleEl) {
      titleEl.textContent = titleEl.textContent.replace(/^Appendix\s+[A-Z]\s*[—–-]\s*/i, "").trim();
    }
    document.title = document.title.replace(/^Appendix\s+[A-Z]\s*[—–-]\s*/i, "");

    // 4. Reset page layout to full-width
    document.querySelectorAll(".page-columns").forEach(function (el) {
      el.style.display = "block";
    });
    var main = document.querySelector("main.content");
    if (main) {
      main.style.maxWidth = "1100px";
      main.style.marginLeft = "auto";
      main.style.marginRight = "auto";
      main.style.paddingLeft = "1.5rem";
      main.style.paddingRight = "1.5rem";
      main.style.gridColumn = "1 / -1";
    }
  }

  // ----------------------------------------------------------
  // 9b. Prune sidebar: hide index, vodic, resursi, alat entries te
  //     SVE vodič-podstranice (vodic/NN-*.html). Podstranice ostaju u
  //     appendices radi rendera, ali se dohvaćaju preko huba, ne sidebara
  //     (izvjestaj-estetski M4). MutationObserver preživljava Quartov re-render.
  // ----------------------------------------------------------
  function removePrunedItems() {
    var endings = ["index.html", "vodic.html", "resursi.html", "alat.html"];
    // Podstranice vodiča: bilo koji href oblika .../vodic/NN-*.html
    var vodicSub = /(^|\/)vodic\/\d+[-\w]*\.html$/;
    document.querySelectorAll("#quarto-sidebar a.sidebar-link, #quarto-sidebar a.sidebar-item-text").forEach(function (a) {
      var href = a.getAttribute("href") || "";
      var hide = vodicSub.test(href);
      if (!hide) {
        for (var i = 0; i < endings.length; i++) {
          if (href.endsWith(endings[i])) { hide = true; break; }
        }
      }
      if (hide) {
        // Hide the link itself
        a.style.display = "none";
        // Hide the parent li if possible
        var li = a.closest(".sidebar-item");
        if (li) li.style.display = "none";
      }
    });
  }

  function pruneSidebar() {
    // Run immediately, then again after 200ms to beat Quarto's own sidebar JS
    removePrunedItems();
    setTimeout(removePrunedItems, 200);
    setTimeout(removePrunedItems, 800);
  }

  // ----------------------------------------------------------
  // 10. OJS upravljačka ploča — ispuna trake klizača (--fill),
  //     puls vrijednosti i gumb ↺ za povratak na početne
  //     vrijednosti. Observable rendira kontrole asinkrono,
  //     pa MutationObserver hvata njihovo pojavljivanje.
  // ----------------------------------------------------------
  function setupOjsPanels() {
    function paintFill(r) {
      var min = parseFloat(r.min), max = parseFloat(r.max);
      if (!isFinite(min)) min = 0;
      if (!isFinite(max)) max = 100;
      var pct = max > min ? ((r.value - min) / (max - min)) * 100 : 0;
      r.style.setProperty("--fill", pct.toFixed(2) + "%");
    }

    function enhanceRange(r) {
      if (r.dataset.ojsEnhanced) return;
      r.dataset.ojsEnhanced = "1";
      r.dataset.ojsInitial = r.value;
      paintFill(r);
      r.addEventListener("input", function () {
        paintFill(r);
        var num = r.parentElement && r.parentElement.querySelector('input[type="number"]');
        if (num) {
          num.classList.remove("ojs-pulse");
          void num.offsetWidth; // restart animacije
          num.classList.add("ojs-pulse");
        }
      });
    }

    function enhancePanel(panel) {
      if (panel.dataset.ojsPanel) return;
      panel.dataset.ojsPanel = "1";
      panel.querySelectorAll("select").forEach(function (s) {
        if (s.dataset.ojsInitial === undefined) s.dataset.ojsInitial = s.value;
      });
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "ojs-reset";
      btn.textContent = "↺ početne vrijednosti";
      btn.title = "Vrati početne vrijednosti";
      btn.addEventListener("click", function () {
        panel.querySelectorAll('input[type="range"]').forEach(function (r) {
          if (r.dataset.ojsInitial === undefined) return;
          r.value = r.dataset.ojsInitial;
          r.dispatchEvent(new Event("input", { bubbles: true }));
        });
        panel.querySelectorAll("select").forEach(function (s) {
          if (s.dataset.ojsInitial === undefined) return;
          s.value = s.dataset.ojsInitial;
          s.dispatchEvent(new Event("input", { bubbles: true }));
          s.dispatchEvent(new Event("change", { bubbles: true }));
        });
      });
      panel.appendChild(btn);
      collapsePanel(panel);
    }

    // Sklopiva ploča: ploču s klizačima omotamo u <details> zatvoren
    // po defaultu, pa graf ostaje vidljiv s početnim vrijednostima, a
    // čitatelj otvara kontrole samo kad ih želi mijenjati. Jedan potez
    // pokriva svih ~90 OJS panela u knjizi bez diranja .qmd izvora.
    function collapsePanel(panel) {
      if (panel.dataset.ojsCollapsed) return;
      var parent = panel.parentElement;
      if (!parent) return;
      panel.dataset.ojsCollapsed = "1";

      var details = document.createElement("details");
      details.className = "ojs-collapsible";

      var summary = document.createElement("summary");
      summary.className = "ojs-collapsible-summary";
      summary.innerHTML =
        '<span class="ojs-collapsible-icon" aria-hidden="true"></span>' +
        '<span class="ojs-collapsible-label">Parametri simulacije</span>' +
        '<span class="ojs-collapsible-hint">otvori za promjenu vrijednosti</span>';

      parent.insertBefore(details, panel);
      details.appendChild(summary);
      details.appendChild(panel);
    }

    var scanQueued = false;
    function scan() {
      scanQueued = false;
      document.querySelectorAll('form[class^="oi-"] input[type="range"]').forEach(enhanceRange);
      // Inputs.form vraća anonimni <div> koji izravno sadrži oi- forme;
      // taj roditelj je ploča (preskačemo Inputs.table forme).
      document.querySelectorAll('form[class^="oi-"]').forEach(function (f) {
        if (f.classList.contains("quarto-ojs-table-fixup")) return;
        var p = f.parentElement;
        if (p && p.tagName === "DIV") enhancePanel(p);
      });
    }
    function queueScan() {
      if (scanQueued) return;
      scanQueued = true;
      window.requestAnimationFrame(scan);
    }

    scan();
    new MutationObserver(queueScan).observe(document.body, { childList: true, subtree: true });
  }

  // ----------------------------------------------------------
  // 11. Sklopivi prozni blokovi — "Što isprobati" (upute uz interaktivni
  //     graf) i "Vježba s podacima" (callout-vjezba na kraju poglavlja).
  //     Koriste isti <details class="ojs-collapsible"> okvir kao ploča
  //     "Parametri simulacije", zatvoren po defaultu, pa cijela knjiga
  //     ima jedan dosljedan obrazac sklapanja. Inner sadržaj dobiva
  //     klasu .ojs-collapsible-prose da SCSS zna kako ga uokviriti.
  // ----------------------------------------------------------
  function wrapCollapsible(node, label, opts) {
    opts = opts || {};
    if (node.dataset.ojsCollapsibleWrapped) return;
    var parent = node.parentElement;
    if (!parent) return;
    node.dataset.ojsCollapsibleWrapped = "1";

    var details = document.createElement("details");
    details.className = "ojs-collapsible ojs-collapsible-prose";

    var summary = document.createElement("summary");
    summary.className = "ojs-collapsible-summary";
    summary.innerHTML =
      '<span class="ojs-collapsible-icon" aria-hidden="true"></span>' +
      '<span class="ojs-collapsible-label"></span>' +
      '<span class="ojs-collapsible-hint"></span>';
    summary.querySelector(".ojs-collapsible-label").textContent = label;
    summary.querySelector(".ojs-collapsible-hint").textContent =
      opts.hint || "otvori za prikaz";

    var body = document.createElement("div");
    body.className = "ojs-collapsible-body";

    parent.insertBefore(details, node);
    details.appendChild(summary);
    details.appendChild(body);
    body.appendChild(node);
  }

  function setupProseCollapsibles() {
    var main = document.querySelector("main.content") || document.querySelector("main");
    if (!main) return;

    // (a) "Što isprobati." paragrafi — prepoznaj po vodećem <strong>.
    main.querySelectorAll("p").forEach(function (p) {
      if (p.dataset.ojsCollapsibleWrapped) return;
      var strong = p.querySelector(":scope > strong:first-child");
      if (!strong) return;
      var t = strong.textContent.trim().replace(/[.:]\s*$/, "");
      if (t !== "Što isprobati") return;
      // Vodeća oznaka seli u summary — ukloni je iz teksta da se ne udvosti.
      strong.remove();
      // Počisti vodeći razmak/interpunkciju koja je ostala iza <strong>.
      if (p.firstChild && p.firstChild.nodeType === 3) {
        p.firstChild.nodeValue = p.firstChild.nodeValue.replace(/^[\s.:]+/, "");
      }
      wrapCollapsible(p, "Što isprobati", { hint: "otvori za upute uz graf" });
    });

    // (b) "Vježba s podacima" — callout-vjezba kutije na kraju poglavlja.
    //     Unutarnji callout gubi vlastiti okvir/oznaku (preuzima ih summary)
    //     preko klase .ojs-collapsible-prose na <details> (vidi SCSS).
    main.querySelectorAll(".callout-vjezba").forEach(function (box) {
      wrapCollapsible(box, "Vježba s podacima", { hint: "otvori vježbu" });
    });
  }

  // ----------------------------------------------------------
  // Bootstrap
  // ----------------------------------------------------------
  function init() {
    try { setupProgressBar(); } catch (e) {}
    try { setupInternalHover(); } catch (e) {}
    try { setupDinkus(); } catch (e) {}
    try { setupAnchorLinks(); } catch (e) {}
    try { setupStandalonePages(); } catch (e) {}
    try { pruneSidebar(); } catch (e) {}
    try { setupOjsPanels(); } catch (e) {}
    try { setupProseCollapsibles(); } catch (e) {}
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
