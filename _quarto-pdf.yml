# PDF profile override.
# Use: scripts/render-book-pdf.ps1   (NOT a bare `quarto render --profile pdf`)
# Output: pdf/Javne-politike.pdf
#
# This file overrides settings from _quarto.yml. Anything not specified here
# is inherited from the default config (HTML build is unaffected).
#
# APPENDICES: the PDF should carry ONLY the bibliography (references.qmd), while
# the website keeps the full appendix set (pojmovnik, vodič, priručnik, resursi,
# alat, podaci, uči-s-AI, predavanja, silabus, raspored). This CANNOT be done from this profile —
# Quarto merges `book.appendices` arrays additively, so a short list here just
# gets appended to the full list in _quarto.yml. Instead, scripts/render-book-pdf.ps1
# temporarily rewrites the appendices block in _quarto.yml to references-only for
# the duration of the render, then restores it. Always render via that script.

project:
  output-dir: pdf

book:
  title: "Država, tržište i institucije"
  subtitle: "Sve što želite znati o državi i javnim politikama u Hrvatskoj"
  output-file: "Javne-politike"

format:
  pdf:
    documentclass: scrbook
    classoption:
      - headings=standardclasses
    pdf-engine: xelatex
    papersize: a4
    geometry:
      - margin=3.2cm
    # Fonts + colours come from the STATECRAFT layer (tex/statecraft.tex);
    # brand TTFs live in fonts/print/ (static instances of the variable fonts).
    lang: hr-HR
    toc: true
    toc-depth: 2
    toc-title: "Sadržaj"
    number-sections: false
    colorlinks: true
    fig-pos: "H"
    include-in-header:
      - tex/statecraft.tex
    include-after-body:
      - tex/statecraft-colophon.tex

# The static R chart twins use Unicode glyphs in annotations (Δ, →, ₙ, ∝, ½, ℓ).
# The default Windows PDF graphics device drops them ("mbcsToSbcs conversion
# failure"); cairo_pdf renders them correctly. Applies only to the PDF profile.
#
# bg = STATECRAFT paper (#F2EDE3): the device canvas is cream, so every chart
# sits on the page seamlessly. This is the floor for charts whose theme paints
# no panel (theme_void diagrams — Edgeworth box, Condorcet cycle — and bare
# supply/demand plots); themed charts (theme_pubfin) paint their own cream on
# top, so cream-on-cream is a no-op there. Without this, theme_void charts show
# the device default (white) as a stark rectangle against the cream page.
knitr:
  opts_chunk:
    dev: "cairo_pdf"
    dev.args:
      cairo_pdf:
        bg: "#F2EDE3"

filters:
  - pdf-filters/strip-ojs.lua
  # Infographic SVGs are pre-rasterized to PNG (scripts/svg-to-png.R) and this
  # filter rewrites their .svg src to .png for the PDF build, so they render
  # without rsvg-convert. The HTML build keeps the vector SVGs untouched.
  - pdf-filters/swap-svg-png.lua
  # Wrap the custom pedagogical callouts (.callout-praksa/empirija/vjezba) into
  # styled tcolorbox environments (defined in tex/statecraft.tex); Quarto would
  # otherwise drop them to plain paragraphs in the PDF.
  - pdf-filters/statecraft-callouts.lua
