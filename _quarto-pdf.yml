# PDF profile override.
# Use: quarto render --profile pdf
# Output: pdf/Javne-politike.pdf
#
# This file overrides settings from _quarto.yml. Anything not specified here
# is inherited from the default config (HTML build is unaffected).

project:
  output-dir: pdf

book:
  title: "Sve što želite znati o državi i javnim politikama u Hrvatskoj"
  subtitle: "Praktični udžbenik · Radna verzija — svibanj 2026"
  output-file: "Javne-politike"
  # Stub chapters (02, 03, 07-11, 16) carry `draft: true` in their YAML
  # frontmatter. We override the base config's `draft-mode: visible` with
  # `gone` to exclude them from the PDF.
  draft-mode: gone

format:
  pdf:
    documentclass: scrbook
    pdf-engine: xelatex
    papersize: a4
    geometry:
      - margin=2.5cm
    mainfont: "Latin Modern Roman"
    sansfont: "Latin Modern Sans"
    monofont: "Latin Modern Mono"
    lang: hr-HR
    babel-lang: croatian
    toc: true
    toc-depth: 2
    number-sections: false
    colorlinks: true
    linkcolor: blue
    urlcolor: blue
    citecolor: blue
    fig-pos: "H"

filters:
  - pdf-filters/strip-ojs.lua
