name: Render and deploy Quarto book

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Authenticate Quarto's GitHub API calls. `tinytex: true` below makes
      # Setup Quarto resolve the latest rstudio/tinytex-releases via
      # api.github.com; unauthenticated that's 60 req/hr/IP and intermittently
      # 403s on shared runners, hard-failing the step. The default token lifts
      # the limit to 5000/hr and removes the flaky failure.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.2'
          use-public-rspm: true

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Restore R packages from renv.lock
        uses: r-lib/actions/setup-renv@v2

      - name: Render HTML book
        run: quarto render

      - name: Render PDF (separate profile, references-only appendices)
        id: pdf
        continue-on-error: true
        run: |
          set -e
          # The PDF must carry only references.qmd as an appendix, while the HTML
          # site keeps the full set. Quarto profiles MERGE appendix arrays, so
          # _quarto-pdf.yml cannot shrink the list — we temporarily rewrite the
          # book-level `  appendices:` block in _quarto.yml to references-only for
          # the render, then always restore it. Mirrors scripts/render-book-pdf.ps1
          # (which is Windows-only). See that script's header for the rationale.
          cp _quarto.yml _quarto.yml.cibak
          trap 'mv -f _quarto.yml.cibak _quarto.yml' EXIT
          awk '
            /^  appendices:[[:space:]]*$/ {
              print "  appendices:"; print "    - references.qmd"; print "";
              skip=1; next
            }
            skip==1 {
              # consume the old block body: deeper-indented items, "  #" comments,
              # and blank lines; stop at the next line that begins a new key.
              if ($0 ~ /^    / || $0 ~ /^  #/ || $0 ~ /^[[:space:]]*$/) next;
              skip=0
            }
            { print }
          ' _quarto.yml.cibak > _quarto.yml
          # Sanity: the swap must have reduced appendices and kept the rest.
          grep -q "^  appendices:" _quarto.yml
          grep -q "^bibliography:" _quarto.yml
          quarto render --profile pdf

      - name: Copy freshly-built PDF into docs for Pages download
        if: steps.pdf.outcome == 'success'
        run: |
          mkdir -p docs/pdf
          cp pdf/Javne-politike.pdf docs/pdf/Javne-politike.pdf

      - name: Warn if PDF render failed (deploying HTML only, old PDF stays)
        if: steps.pdf.outcome != 'success'
        run: |
          echo "::warning::PDF render failed — the docs/pdf/Javne-politike.pdf deployed will be the previously-committed version, not a fresh build. Check the 'Render PDF' step logs above for the LaTeX/Quarto error."

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
