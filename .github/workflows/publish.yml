name: Render and deploy Quarto book

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.2'
          use-public-rspm: true

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Restore R packages from renv.lock
        uses: r-lib/actions/setup-renv@v2

      - name: Render HTML book
        run: quarto render

      - name: Render PDF (separate profile)
        id: pdf
        run: quarto render --profile pdf
        continue-on-error: true

      - name: Copy freshly-built PDF into docs for Pages download
        if: steps.pdf.outcome == 'success'
        run: |
          mkdir -p docs/pdf
          cp pdf/Javne-politike.pdf docs/pdf/Javne-politike.pdf

      - name: Warn if PDF render failed (deploying HTML only, old PDF stays)
        if: steps.pdf.outcome != 'success'
        run: |
          echo "::warning::PDF render failed — the docs/pdf/Javne-politike.pdf deployed will be the previously-committed version, not a fresh build. Check the 'Render PDF' step logs above for the LaTeX/Quarto error."

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
