project:
  type: book
  output-dir: docs
  execute-dir: project

book:
  title: "Sve što želite znati o državi i javnim politikama u hrvatskoj"
  subtitle: "Praktični i interaktivni udžbenik za studente i sve koji žele znati više"
  author:
    - name: "Milan Deskar-Škrbić"
      email: "milan.deskar-skrbic@hnb.hr"
      url: "https://zsem.hr/clanovi/dr-sc-milan-deskar-skrbic/"
    - name: "Petra Palić"
      email: "petra.palic@unicath.hr"
      url: "https://www.unicath.hr/odjeli-i-fakultet/nastavnici/petra-palic"
    - name: "Luka Sikić"
      email: "luka.sikic@unicath.hr"
      url: "https://www.unicath.hr/odjeli-i-fakultet/nastavnici/luka-sikic"

  date: last-modified
  date-format: "D MMMM YYYY"
  language: hr-HR

  site-url: "https://lusiki.github.io/Javne-politike/"
  repo-url: "https://github.com/lusiki/Javne-politike"
  repo-branch: main
  repo-actions: [edit, issue]

  cover-image: "/cover.png"
  favicon: "images/favicon.ico"

  search:
    location: sidebar
    type: overlay
  page-navigation: true
  reader-mode: true
  sharing: [twitter, facebook, linkedin]

  sidebar:
    style: docked
    background: light
    collapse-level: 4

  page-footer:
    center: "© 2026 Deskar-Škrbić, Palić, Šikić | Javne politike u Hrvatskoj"

  # Stub chapters (those with `draft: true` in YAML) are kept VISIBLE in HTML
  # so readers see the planned structure. The PDF profile overrides this with
  # `gone` so stubs are excluded from PDF.
  draft-mode: visible

  # Stub chapters (02, 03, 07-11, 16) marked with `draft: true` are intentionally
  # excluded from the chapters list. Their files remain in chapters/ for editing.
  # When their content is written, add them back here.
  chapters:
    - index.qmd
    - part: "DIO I: DRŽAVA, JAVNE POLITIKE I TEMELJNI PRISTUPI ANALIZI"
      chapters:
        - chapters/01-pristupi.qmd
        - chapters/04-institucije.qmd
        - chapters/05-konstitucionalna.qmd
    - part: "DIO II: JAVNI IZBOR – ŠTO, KAKO I ZAŠTO?"
      chapters:
        - chapters/06-javni-izbor.qmd
    - part: "DIO III: JAVNE FINANCIJE I JAVNE POLITIKE U PRAKSI"
      chapters:
        - chapters/12-drzavna-potrosnja.qmd
        - chapters/13-porezi.qmd
        - chapters/14-odluke-cba.qmd
        - chapters/15-odluke-reforme.qmd

  appendices:
    - references.qmd

bibliography: references.bib

crossref:
  fig-title: "Slika"
  tbl-title: "Tablica"
  sec-prefix: "Poglavlje"
  fig-prefix: "Slika"
  tbl-prefix: "Tablica"

format:
  html:
    theme:
      light:
        - cosmo
        - brand
        - styles/custom.scss
      dark:
        - cosmo
        - brand
        - styles/custom.scss
        - styles/_dark.scss
    css: styles/styles.css
    lightbox: auto
    code-copy: true
    code-fold: true
    code-summary: "Prikaži kod"
    code-tools: true
    code-link: true
    code-overflow: scroll
    code-line-numbers: false
    code-block-bg: true
    highlight-style: github
    toc: true
    toc-depth: 3
    toc-expand: 2
    toc-location: right
    number-sections: false
    smooth-scroll: true
    anchor-sections: true
    link-external-icon: true
    link-external-newwindow: true
    fig-responsive: true
    fig-align: center
    fig-cap-location: bottom
    fig-width: 8
    fig-height: 6
    tbl-cap-location: top
    reference-location: margin
    citation-location: margin
    fontsize: 1.02rem
    linestretch: 1.6
    lang: hr-HR
    citations-hover: true
    footnotes-hover: true
    crossrefs-hover: true
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    include-after-body:
      - styles/book-include.html
    comments:
      hypothesis: true
    prefer-html: true

execute:
  freeze: auto
  cache: true
  echo: true
  warning: false
  message: false
