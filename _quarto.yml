project:
  type: book
  output-dir: docs
  execute-dir: project
  # AI-konzumabilni izvoz (Track A, notes/ai-export-spec.md). Generira docs/ai/*.md,
  # docs/llms.txt, docs/llms-full.txt i data/ai-exports.json prije rendera. Skripta je
  # obavijena tryCatch-om pa nikad ne ruši build; može se pokrenuti i ručno.
  pre-render:
    - R/build-ai-exports.R
  resources:
    - images/apple-touch-icon.png
    - pdf/Prirucnik.pdf
    - robots.txt
    # Predavanja (reveal.js slajdovi) renderiraju se zasebno u predavanja/ i
    # ovdje se kopiraju u docs/predavanja/ pri svakom renderu knjige.
    - predavanja/01-uvod-u-javni-izbor.html
    - predavanja/02-vrste-dobara.html
    - predavanja/03-eksternalije.html
    - predavanja/04-blagostanje-redistribucija.html
    - predavanja/05-stabilizacija.html
    - predavanja/06-oporezivanje.html
    - predavanja/07-teorija-igara.html
    - predavanja/08-kolektivni-izbor.html
    # Slika za dijeljenje linka (OG/Twitter image: ph3.jpg) — eksplicitno
    # navedena kao resurs da se sigurno kopira u docs/ pri renderu.
    - ph3.jpg
    # Samostalne HTML stranice sa životopisima (link s naslovnice na imenima autora).
    - cv-milan.html
    - cv-petra.html
    - cv-luka.html
    # Fotografije za životopise (portretni 4:5 izrez, head-to-hands).
    - images/milan-deskar-skrbic.jpg
    - images/petra-palic.jpg
    - images/luka-sikic.jpg

book:
  title: "Sve što želite znati o državi i javnim politikama u Hrvatskoj"
  subtitle: "Praktični i interaktivni udžbenik za studente i sve koji žele znati više"
  author:
    - name: "Petra Palić"
      email: "petra.palic@unicath.hr"
      url: "https://www.unicath.hr/odjeli-i-fakultet/nastavnici/petra-palic"
    - name: "Luka Šikić"
      email: "luka.sikic@unicath.hr"
      url: "https://www.lukasikic.info/"
    - name: "Milan Deskar-Škrbić"
      email: "milan.deskar-skrbic@hnb.hr"
      url: "https://zsem.hr/clanovi/dr-sc-milan-deskar-skrbic/"

  date: last-modified
  date-format: "D MMMM YYYY"
  language: hr-HR

  # Opis + cover za dijeljenje (OG/Twitter). cover-image re-aktivira skriveni
  # custom.scss blok građen oko auto-injektirane cover slike (izvjestaj-estetski M15).
  description: "Praktični i interaktivni udžbenik o javnim financijama, teoriji javnog izbora i javnim politikama u Hrvatskoj — uloga države, alokacija, redistribucija, institucije i reforme."
  cover-image: cover.png

  site-url: "https://lusiki.github.io/Javne-politike/"

  favicon: "images/favicon.ico"

  navbar:
    pinned: true
    left:
      - text: "Knjiga"
        href: chapters/00-uvod.qmd
      - text: "Vodič"
        href: vodic.html
      - text: "Pojmovnik"
        href: pojmovnik.html
      - text: "Alat"
        href: alat.html
      - text: "Podaci"
        href: podaci.html
      - text: "Uči uz AI"
        href: uci-s-ai.html
      - text: "Nastava"
        menu:
          - text: "Predavanja"
            href: predavanja.html
          - text: "Silabus"
            href: silabus.html
          - text: "Tjedni raspored"
            href: raspored.html
      - text: "Resursi"
        href: resursi.html
      - text: "Upute"
        href: upute.html
    right: []

  search:
    location: sidebar
    type: overlay
  page-navigation: true
  reader-mode: true
  sharing: [twitter, facebook, linkedin]

  sidebar:
    style: docked
    background: light
    collapse-level: 4
    tools:
      - icon: file-earmark-pdf
        href: pdf/Javne-politike.pdf
        text: "Preuzmi PDF (radna verzija)"

  page-footer:
    center: "© 2026 Palić, Šikić, Deskar-Škrbić | Javne politike u Hrvatskoj"

  chapters:
    - index.qmd
    - chapters/00-uvod.qmd
    - part: "DIO I: KLASIČNA ANALIZA JAVNIH FINANCIJA I POLITIKA"
      chapters:
        - chapters/01-uloga-drzave.qmd
        - chapters/02-alokacijska-funkcija.qmd
        - chapters/03-distribucijska-funkcija.qmd
        - chapters/04-stabilizacijska-funkcija.qmd
        - chapters/05-porezi.qmd
    - part: "DIO II: JAVNI IZBOR – ŠTO, KAKO I ZAŠTO?"
      chapters:
        - chapters/06-javni-izbor.qmd
        - chapters/06a-teorija-igara.qmd
        - chapters/07-kolektivni-izbor.qmd
        - chapters/08-stranke-izbori.qmd
        - chapters/09-interesne-skupine.qmd
        - chapters/10-birokracija.qmd
    - part: "DIO III: NOVA INSTITUCIONALNA I KONSTITUCIONALNA EKONOMIKA"
      chapters:
        - chapters/11-institucionalna-ekonomika.qmd
        - chapters/12-konstitucionalna-ekonomika.qmd
    - part: "DIO IV: JAVNE FINANCIJE I JAVNE POLITIKE U PRAKSI"
      chapters:
        - chapters/13-instrumenti.qmd
        - chapters/14-javna-potrosnja.qmd
        - chapters/15-porezi-praksa.qmd
        - chapters/16-eu-javne-financije.qmd
    - part: "DIO V: KAKO DO KVALITETNIJIH JAVNIH POLITIKA?"
      chapters:
        - chapters/17-drzavni-neuspjesi.qmd
        - chapters/18-novi-javni-menadzment.qmd
        - chapters/19-novo-upravljanje.qmd
        - chapters/20-cba-evaluacija.qmd
        - chapters/21-reforme.qmd

  appendices:
    - references.qmd
    - pojmovnik.qmd
    - vodic.qmd
    # Vodič-podstranice ostaju u appendices da se renderiraju (hub linka na
    # vodic/NN.html), ali se sakrivaju iz sidebara JS-om u book-include.html
    # (pruneSidebar) da ga ne pretrpaju (izvjestaj-estetski M4).
    - vodic/01-uloga-drzave.qmd
    - vodic/02-alokacijska-funkcija.qmd
    - vodic/03-distribucijska-funkcija.qmd
    - vodic/04-stabilizacijska-funkcija.qmd
    - vodic/05-porezi.qmd
    - vodic/06-javni-izbor.qmd
    - vodic/06a-teorija-igara.qmd
    - vodic/07-kolektivni-izbor.qmd
    - vodic/08-stranke-izbori.qmd
    - vodic/09-interesne-skupine.qmd
    - vodic/10-birokracija.qmd
    - vodic/11-institucionalna-ekonomika.qmd
    - vodic/12-konstitucionalna-ekonomika.qmd
    - vodic/13-instrumenti.qmd
    - vodic/14-javna-potrosnja.qmd
    - vodic/15-porezi-praksa.qmd
    - vodic/16-eu-javne-financije.qmd
    - vodic/17-drzavni-neuspjesi.qmd
    - vodic/18-novi-javni-menadzment.qmd
    - vodic/19-novo-upravljanje.qmd
    - vodic/20-cba-evaluacija.qmd
    - vodic/21-reforme.qmd
    - prirucnik.qmd
    - resursi.qmd
    - alat.qmd
    - podaci.qmd
    - uci-s-ai.qmd
    - predavanja.qmd
    - silabus.qmd
    - raspored.qmd
    - upute.qmd

bibliography: references.bib

crossref:
  # Ravna (kontinuirana) numeracija — poglavlja su nenumerirana
  # (number-sections: false), pa "Slika 7.1" referencira nevidljiv broj
  # poglavlja. chapters:false daje "Slika 1, Slika 2…" kroz cijelu knjigu.
  chapters: false
  fig-title: "Slika"
  tbl-title: "Tablica"
  sec-prefix: "Poglavlje"
  fig-prefix: "Slika"
  tbl-prefix: "Tablica"
  thm-title: "Teorem"
  thm-prefix: "Teorem"
  lem-title: "Lema"
  lem-prefix: "Lema"
  cor-title: "Korolar"
  cor-prefix: "Korolar"
  prp-title: "Propozicija"
  prp-prefix: "Propozicija"
  def-title: "Definicija"
  def-prefix: "Definicija"
  exm-title: "Primjer"
  exm-prefix: "Primjer"
  exr-title: "Vježba"
  exr-prefix: "Vježba"

format:
  html:
    # Social/share metadata (izvjestaj-estetski M15) — dijeljeni link dobiva
    # naslov, opis i sliku umjesto golog URL-a. Slika dijeljenja je ph3.jpg
    # (eksplicitni image: nadjačava cover-image samo za OG/Twitter — vidljivi
    # cover i PDF naslovnica i dalje koriste cover.png).
    open-graph:
      image: ph3.jpg
    twitter-card:
      card-style: summary_large_image
      image: ph3.jpg
    theme:
      light:
        - cosmo
        - brand
        - styles/custom.scss
      dark:
        - cosmo
        - brand
        - styles/custom.scss
        - styles/_dark.scss
    css: styles/styles.css
    lightbox: auto
    code-copy: true
    code-fold: true
    code-summary: "Prikaži kod"
    code-tools: true
    code-link: true
    code-overflow: scroll
    code-line-numbers: false
    code-block-bg: true
    highlight-style: github
    toc: true
    toc-depth: 3
    toc-expand: 2
    toc-location: right
    number-sections: false
    smooth-scroll: true
    anchor-sections: true
    link-external-icon: true
    link-external-newwindow: true
    fig-responsive: true
    fig-align: center
    fig-cap-location: bottom
    fig-width: 8
    fig-height: 6
    tbl-cap-location: top
    reference-location: margin
    citation-location: margin
    theorem-appearance: clouds
    definition-appearance: clouds
    proposition-appearance: simple
    proof-appearance: simple
    fontsize: 1.02rem
    linestretch: 1.6
    lang: hr-HR
    citations-hover: true
    footnotes-hover: true
    crossrefs-hover: true
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,300;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
    include-after-body:
      - styles/book-include.html
    comments:
      hypothesis: true
    prefer-html: true

execute:
  freeze: auto
  cache: true
  echo: true
  warning: false
  message: false
