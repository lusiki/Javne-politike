project:
  type: book
  output-dir: docs
  execute-dir: project

book:
  title: "Sve što želite znati o odnosu države i tržišta"
  subtitle: "Praktični i interaktivni udžbenik za studente i sve koji žele znati više"
  author:
    - name: "Milan Deskar-Škrbić"
      email: "milan.deskar-skrbic@hnb.hr"
      url: "https://zsem.hr/clanovi/dr-sc-milan-deskar-skrbic/"
    - name: "Petra Palić"
      email: "petra.palic@unicath.hr"
      url: "https://www.unicath.hr/odjeli-i-fakultet/nastavnici/petra-palic"
    - name: "Luka Sikić"
      email: "luka.sikic@unicath.hr"
      url: "https://www.lukasikic.info/"

  date: last-modified
  date-format: "D MMMM YYYY"
  language: hr-HR

  site-url: "https://lusiki.github.io/Javne-politike/"

  favicon: "images/favicon.ico"

  navbar:
    pinned: true
    left:
      - text: "Knjiga"
        href: chapters/00-uvod.qmd
      - text: "Vodič"
        href: vodic.html
      - text: "Resursi"
        href: resursi.html
      - text: "Alat"
        href: alat.html
      - text: "Podaci"
        href: podaci.html
    right: []

  search:
    location: sidebar
    type: overlay
  page-navigation: true
  reader-mode: true
  sharing: [twitter, facebook, linkedin]

  sidebar:
    style: docked
    background: light
    collapse-level: 4
    tools:
      - icon: file-earmark-pdf
        href: pdf/Javne-politike.pdf
        text: "Preuzmi PDF (radna verzija)"

  page-footer:
    center: "© 2026 Deskar-Škrbić, Palić, Šikić | Javne politike u Hrvatskoj"

  chapters:
    - index.qmd
    - chapters/00-uvod.qmd
    - part: "DIO I: KLASIČNA ANALIZA JAVNIH FINANCIJA I POLITIKA"
      chapters:
        - chapters/01-uloga-drzave.qmd
        - chapters/02-alokacijska-funkcija.qmd
        - chapters/03-distribucijska-funkcija.qmd
        - chapters/04-stabilizacijska-funkcija.qmd
    - part: "DIO II: JAVNI IZBOR – ŠTO, KAKO I ZAŠTO?"
      chapters:
        - chapters/05-javni-izbor.qmd
        - chapters/06-kolektivni-izbor.qmd
        - chapters/07-stranke-izbori.qmd
        - chapters/08-interesne-skupine.qmd
        - chapters/09-birokracija.qmd
    - part: "DIO III: NOVA INSTITUCIONALNA I KONSTITUCIONALNA EKONOMIKA"
      chapters:
        - chapters/10-institucionalna-ekonomika.qmd
        - chapters/11-konstitucionalna-ekonomika.qmd
    - part: "DIO IV: JAVNE FINANCIJE I JAVNE POLITIKE U PRAKSI"
      chapters:
        - chapters/12-instrumenti.qmd
        - chapters/13-javna-potrosnja.qmd
        - chapters/14-porezi.qmd
    - part: "DIO V: KAKO DO KVALITETNIJIH JAVNIH POLITIKA?"
      chapters:
        - chapters/15-drzavni-neuspjesi.qmd
        - chapters/16-novi-javni-menadzment.qmd
        - chapters/17-novo-upravljanje.qmd
        - chapters/18-cba-evaluacija.qmd
        - chapters/19-reforme.qmd

  appendices:
    - references.qmd
    - vodic.qmd
    - vodic/01-uloga-drzave.qmd
    - vodic/02-alokacijska-funkcija.qmd
    - vodic/03-distribucijska-funkcija.qmd
    - vodic/04-stabilizacijska-funkcija.qmd
    - vodic/05-javni-izbor.qmd
    - vodic/06-kolektivni-izbor.qmd
    - vodic/07-stranke-izbori.qmd
    - vodic/08-interesne-skupine.qmd
    - vodic/09-birokracija.qmd
    - vodic/10-institucionalna-ekonomika.qmd
    - vodic/11-konstitucionalna-ekonomika.qmd
    - vodic/12-instrumenti.qmd
    - vodic/13-javna-potrosnja.qmd
    - vodic/14-porezi.qmd
    - vodic/15-drzavni-neuspjesi.qmd
    - vodic/16-novi-javni-menadzment.qmd
    - vodic/17-novo-upravljanje.qmd
    - vodic/18-cba-evaluacija.qmd
    - vodic/19-reforme.qmd
    - resursi.qmd
    - alat.qmd
    - podaci.qmd

bibliography: references.bib

crossref:
  fig-title: "Slika"
  tbl-title: "Tablica"
  sec-prefix: "Poglavlje"
  fig-prefix: "Slika"
  tbl-prefix: "Tablica"
  thm-title: "Teorem"
  thm-prefix: "Teorem"
  lem-title: "Lema"
  lem-prefix: "Lema"
  cor-title: "Korolar"
  cor-prefix: "Korolar"
  prp-title: "Propozicija"
  prp-prefix: "Propozicija"
  def-title: "Definicija"
  def-prefix: "Definicija"
  exm-title: "Primjer"
  exm-prefix: "Primjer"
  exr-title: "Vježba"
  exr-prefix: "Vježba"

format:
  html:
    theme:
      light:
        - cosmo
        - brand
        - styles/custom.scss
      dark:
        - cosmo
        - brand
        - styles/custom.scss
        - styles/_dark.scss
    css: styles/styles.css
    lightbox: auto
    code-copy: true
    code-fold: true
    code-summary: "Prikaži kod"
    code-tools: true
    code-link: true
    code-overflow: scroll
    code-line-numbers: false
    code-block-bg: true
    highlight-style: github
    toc: true
    toc-depth: 3
    toc-expand: 2
    toc-location: right
    number-sections: false
    smooth-scroll: true
    anchor-sections: true
    link-external-icon: true
    link-external-newwindow: true
    fig-responsive: true
    fig-align: center
    fig-cap-location: bottom
    fig-width: 8
    fig-height: 6
    tbl-cap-location: top
    reference-location: margin
    citation-location: margin
    theorem-appearance: clouds
    definition-appearance: clouds
    proposition-appearance: simple
    proof-appearance: simple
    fontsize: 1.02rem
    linestretch: 1.6
    lang: hr-HR
    citations-hover: true
    footnotes-hover: true
    crossrefs-hover: true
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,300;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
    include-after-body:
      - styles/book-include.html
    comments:
      hypothesis: true
    prefer-html: true

execute:
  freeze: auto
  cache: true
  echo: true
  warning: false
  message: false
