meta:
  name: "Sve što želite znati o državi i javnim politikama u Hrvatskoj"
  link: https://lusiki.github.io/Javne-politike/

color:
  palette:
    near-black: "#171411"
    slate: "#5A4F3F"
    brick: "#9C302B"
    navy: "#2D5A8E"
    warm-grey: "#9F907B"
    light-warm: "#EFE5D5"
    cream: "#F6F1E8"
    paper: "#EFE7D5"
  foreground: near-black
  background: cream
  primary: near-black
  secondary: slate
  success: "#2F7A5C"
  info: navy
  warning: "#C57832"
  danger: brick

typography:
  fonts:
    - family: "Source Serif 4"
      source: google
    - family: "Inter"
      source: google
    - family: "JetBrains Mono"
      source: google
  base:
    family: "Source Serif 4"
    size: 1.02rem
    line-height: 1.6
  headings:
    family: "Inter"
    weight: 600
    color: near-black
  monospace:
    family: "JetBrains Mono"
    size: 0.85em
