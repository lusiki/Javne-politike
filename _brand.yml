meta:
  name: "Sve što želite znati o državi i javnim politikama u Hrvatskoj"
  link: https://lusiki.github.io/Javne-politike/

color:
  palette:
    navy: "#1B2A4A"
    slate: "#4A5568"
    gold: "#C8942D"
    light-gold: "#F5ECD7"
    cream: "#FAFAF5"
    charcoal: "#2D3748"
  foreground: charcoal
  background: cream
  primary: navy
  secondary: slate
  success: "#2F855A"
  info: gold
  warning: "#DD6B20"
  danger: "#C53030"

typography:
  fonts:
    - family: "Roboto Slab"
      source: google
    - family: "Roboto"
      source: google
    - family: "Roboto Mono"
      source: google
  base:
    family: "Roboto Slab"
    size: 1rem
    line-height: 1.7
  headings:
    family: "Roboto"
    weight: 600
    color: navy
  monospace:
    family: "Roboto Mono"
    size: 0.85em
